<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Neko Nav</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #ececec;
      font-family: "Noto Sans SC", "PingFang SC", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .wrap { max-width: 400px; }
    .code { font-size: 6rem; font-weight: 900; color: #fa458c; line-height: 1; }
    .msg { font-size: 1.2rem; margin: 1rem 0 2rem; color: #898989; }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.6rem;
      border-radius: 2rem;
      background: transparent;
      border: 1px solid #fa458c;
      color: #fa458c;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn:hover { background: #fa458c; color: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="msg">页面不存在</div>
    <a class="btn" href="/">返回首页</a>
  </div>
</body>
</html>
